<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="40%" stop-color="#2e86c1"/>
      <stop offset="100%" stop-color="#85c1e9"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>
    <linearGradient id="sun" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f9e79f"/>
      <stop offset="100%" stop-color="#f5b041"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#sky)"/>
  <circle cx="950" cy="100" r="45" fill="url(#sun)"/>
  <polygon points="0,320 150,80 300,320" fill="url(#mountain1)" opacity="0.8"/>
  <polygon points="200,320 400,60 550,320" fill="url(#mountain2)" opacity="0.7"/>
  <polygon points="450,320 600,100 750,320" fill="url(#mountain1)" opacity="0.6"/>
  <polygon points="650,320 820,50 1000,320" fill="url(#mountain2)" opacity="0.75"/>
  <polygon points="900,320 1050,90 1200,320" fill="url(#mountain1)" opacity="0.65"/>
  <rect x="0" y="320" width="1200" height="80" fill="#27ae60"/>
  <rect x="0" y="320" width="1200" height="3" fill="#1e8449"/>
  <!-- City buildings silhouette -->
  <rect x="100" y="270" width="40" height="50" fill="#2c3e50" opacity="0.8"/>
  <rect x="145" y="255" width="35" height="65" fill="#34495e" opacity="0.8"/>
  <rect x="185" y="265" width="45" height="55" fill="#2c3e50" opacity="0.8"/>
  <rect x="235" y="245" width="30" height="75" fill="#34495e" opacity="0.8"/>
  <rect x="270" y="260" width="50" height="60" fill="#2c3e50" opacity="0.8"/>
  <rect x="325" y="275" width="35" height="45" fill="#34495e" opacity="0.8"/>
  <rect x="700" y="260" width="40" height="60" fill="#2c3e50" opacity="0.8"/>
  <rect x="745" y="250" width="30" height="70" fill="#34495e" opacity="0.8"/>
  <rect x="780" y="265" width="45" height="55" fill="#2c3e50" opacity="0.8"/>
  <rect x="830" y="245" width="35" height="75" fill="#34495e" opacity="0.8"/>
  <rect x="400" y="280" width="50" height="40" fill="#3a5a30" opacity="0.6"/>
  <rect x="455" y="275" width="40" height="45" fill="#2d4a25" opacity="0.6"/>
  <rect x="500" y="270" width="55" height="50" fill="#3a5a30" opacity="0.6"/>
  <!-- Trees -->
  <circle cx="560" cy="285" r="20" fill="#1e8449" opacity="0.7"/>
  <circle cx="590" cy="280" r="18" fill="#27ae60" opacity="0.7"/>
  <circle cx="620" cy="288" r="15" fill="#1e8449" opacity="0.7"/>
  <circle cx="650" cy="282" r="22" fill="#27ae60" opacity="0.7"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="80" rx="60" ry="20" fill="white" opacity="0.3"/>
  <ellipse cx="220" cy="75" rx="40" ry="15" fill="white" opacity="0.25"/>
  <ellipse cx="500" cy="120" rx="50" ry="15" fill="white" opacity="0.2"/>
  <ellipse cx="750" cy="90" rx="45" ry="12" fill="white" opacity="0.25"/>
  <!-- Sun rays -->
  <line x1="950" y1="55" x2="950" y2="35" stroke="#f9e79f" stroke-width="2" opacity="0.5"/>
  <line x1="905" y1="70" x2="888" y2="55" stroke="#f9e79f" stroke-width="2" opacity="0.5"/>
  <line x1="995" y1="70" x2="1012" y2="55" stroke="#f9e79f" stroke-width="2" opacity="0.5"/>
</svg>